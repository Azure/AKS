<svg viewBox="0 0 820 620" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 z" fill="#5B6B7B"/>
    </marker>
    <marker id="arB" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 z" fill="#0078D4"/>
    </marker>
    <style>
      text { font-family: "Segoe UI", -apple-system, system-ui, "Helvetica Neue", sans-serif; }
      .t { fill:#243A5E; font-weight:600; }
      .s { fill:#5B6B7B; }
      .step { fill:#5B6B7B; font-weight:700; }
    </style>
  </defs>

  <rect x="2" y="2" width="816" height="616" rx="14" fill="#ffffff" stroke="#E2E8F0" stroke-width="1.5"/>

  <text x="32" y="40" font-size="20" class="t">Agent call · one request, in order</text>
  <text x="32" y="59" font-size="12" class="s">the per-call trace through the three layers — for who-owns-what and managed vs. OSS, see the structure diagram</text>

  <!-- step-badge helper look: small circles on the flow arrows -->

  <!-- Client -->
  <rect x="130" y="80" width="280" height="48" rx="10" fill="#ffffff" stroke="#C9D6E2" stroke-width="1.3"/>
  <rect x="142" y="94" width="18" height="18" rx="4" fill="#64748B"/>
  <text x="170" y="109" font-size="13.5" class="t">Agent / app</text>

  <!-- flow 1 -->
  <line x1="270" y1="128" x2="270" y2="160" stroke="#5B6B7B" stroke-width="1.5" marker-end="url(#ar)"/>
  <circle cx="248" cy="144" r="9" fill="#ffffff" stroke="#5B6B7B" stroke-width="1.3"/>
  <text x="248" y="148" font-size="10" class="step" text-anchor="middle">1</text>
  <text x="288" y="140" font-size="10" class="s">POST /v1/chat/completions</text>
  <text x="288" y="153" font-size="10" class="s">model: "router-mf-0.11593"</text>

  <!-- Layer 1: RouteLLM -->
  <circle cx="100" cy="196" r="13" fill="#0078D4"/>
  <text x="100" y="201" font-size="13" fill="#ffffff" font-weight="700" text-anchor="middle">1</text>
  <rect x="130" y="160" width="280" height="72" rx="10" fill="#ffffff" stroke="#C9D6E2" stroke-width="1.3"/>
  <rect x="142" y="176" width="18" height="18" rx="4" fill="#64748B"/>
  <text x="170" y="188" font-size="13.5" class="t">RouteLLM</text>
  <text x="170" y="206" font-size="10.5" class="s">semantic decision (matrix-factorization)</text>
  <text x="170" y="223" font-size="10.5" fill="#0078D4">reads prompt → picks strong | weak</text>

  <!-- flow 2 -->
  <line x1="270" y1="232" x2="270" y2="262" stroke="#5B6B7B" stroke-width="1.5" marker-end="url(#ar)"/>
  <circle cx="248" cy="247" r="9" fill="#ffffff" stroke="#5B6B7B" stroke-width="1.3"/>
  <text x="248" y="251" font-size="10" class="step" text-anchor="middle">2</text>
  <text x="288" y="251" font-size="10" class="s">forwards model: strong | weak</text>

  <!-- Layer 2: agentgateway -->
  <circle cx="100" cy="298" r="13" fill="#0078D4"/>
  <text x="100" y="303" font-size="13" fill="#ffffff" font-weight="700" text-anchor="middle">2</text>
  <rect x="130" y="262" width="280" height="72" rx="10" fill="#ffffff" stroke="#C9D6E2" stroke-width="1.3"/>
  <rect x="142" y="278" width="18" height="18" rx="4" fill="#64748B"/>
  <text x="170" y="290" font-size="13.5" class="t">agentgateway</text>
  <text x="170" y="308" font-size="10.5" class="s">auth · budget · guardrails · OTel</text>
  <text x="170" y="325" font-size="10.5" fill="#0078D4">dispatches by model name</text>

  <!-- strong branch: step 3a -->
  <line x1="410" y1="298" x2="498" y2="298" stroke="#0078D4" stroke-width="1.6" marker-end="url(#arB)"/>
  <circle cx="470" cy="313" r="9" fill="#ffffff" stroke="#0078D4" stroke-width="1.3"/>
  <text x="470" y="317" font-size="9.5" fill="#0067B8" font-weight="700" text-anchor="middle">3a</text>
  <text x="428" y="288" font-size="10.5" fill="#0067B8" font-weight="600">strong</text>
  <rect x="500" y="262" width="250" height="72" rx="10" fill="#ffffff" stroke="#C9D6E2" stroke-width="1.3"/>
  <rect x="512" y="278" width="18" height="18" rx="4" fill="#0078D4"/>
  <text x="540" y="290" font-size="13.5" class="t">Azure OpenAI</text>
  <text x="540" y="308" font-size="10.5" class="s">gpt-5.1 deployment</text>
  <text x="540" y="325" font-size="10.5" fill="#0067B8">frontier model · ends here</text>

  <!-- weak branch: step 3b -->
  <line x1="270" y1="334" x2="270" y2="366" stroke="#5B6B7B" stroke-width="1.5" marker-end="url(#ar)"/>
  <circle cx="248" cy="350" r="9" fill="#ffffff" stroke="#5B6B7B" stroke-width="1.3"/>
  <text x="248" y="354" font-size="9.5" class="step" text-anchor="middle">3b</text>
  <text x="288" y="354" font-size="10.5" class="s" font-weight="600">weak</text>

  <!-- Layer 3 group -->
  <circle cx="100" cy="399" r="13" fill="#0078D4"/>
  <text x="100" y="404" font-size="13" fill="#ffffff" font-weight="700" text-anchor="middle">3</text>

  <!-- Inference Extension (EPP) — agentgateway calls it directly on the weak path -->
  <rect x="130" y="366" width="280" height="66" rx="10" fill="#ffffff" stroke="#C9D6E2" stroke-width="1.3"/>
  <rect x="142" y="380" width="18" height="18" rx="4" fill="#64748B"/>
  <text x="170" y="392" font-size="13.5" class="t">Inference Extension (EPP)</text>
  <text x="170" y="410" font-size="10.5" class="s">picks the best pod by</text>
  <text x="170" y="426" font-size="10" fill="#0067B8">KV-cache % · queue depth · LoRA affinity</text>

  <!-- flow 4 -->
  <line x1="270" y1="432" x2="270" y2="458" stroke="#5B6B7B" stroke-width="1.5" marker-end="url(#ar)"/>
  <circle cx="248" cy="445" r="9" fill="#ffffff" stroke="#5B6B7B" stroke-width="1.3"/>
  <text x="248" y="449" font-size="10" class="step" text-anchor="middle">4</text>

  <!-- KAITO -->
  <rect x="130" y="458" width="280" height="66" rx="10" fill="#ffffff" stroke="#C9D6E2" stroke-width="1.3"/>
  <rect x="142" y="472" width="18" height="18" rx="4" fill="#0078D4"/>
  <text x="170" y="484" font-size="13.5" class="t">KAITO Workspace</text>
  <text x="170" y="502" font-size="10.5" class="s">AI toolchain operator add-on</text>
  <text x="170" y="518" font-size="10" fill="#0067B8">agentgateway forwards to the chosen pod</text>

  <!-- flow 5 -->
  <line x1="270" y1="524" x2="270" y2="550" stroke="#5B6B7B" stroke-width="1.5" marker-end="url(#ar)"/>
  <circle cx="248" cy="537" r="9" fill="#ffffff" stroke="#5B6B7B" stroke-width="1.3"/>
  <text x="248" y="541" font-size="10" class="step" text-anchor="middle">5</text>

  <!-- vLLM pods -->
  <g font-size="11.5">
    <rect x="138" y="550" width="80" height="42" rx="8" fill="#E6F2FB" stroke="#0078D4" stroke-width="1.2"/>
    <text x="178" y="575" fill="#0067B8" text-anchor="middle">vLLM</text>
    <rect x="230" y="550" width="80" height="42" rx="8" fill="#E6F2FB" stroke="#0078D4" stroke-width="1.2"/>
    <text x="270" y="575" fill="#0067B8" text-anchor="middle">vLLM</text>
    <rect x="322" y="550" width="80" height="42" rx="8" fill="#E6F2FB" stroke="#0078D4" stroke-width="1.2"/>
    <text x="362" y="575" fill="#0067B8" text-anchor="middle">vLLM</text>
  </g>
  <text x="430" y="568" font-size="10.5" class="s">one pod chosen by GPU state</text>
  <text x="430" y="583" font-size="10.5" class="s">· weak path ends here</text>

  <!-- legend -->
  <rect x="500" y="392" width="16" height="16" rx="3" fill="#0078D4"/>
  <text x="522" y="405" font-size="11" class="t" font-weight="400">managed Azure</text>
  <rect x="500" y="414" width="16" height="16" rx="3" fill="#ffffff" stroke="#64748B" stroke-width="1.5"/>
  <text x="522" y="427" font-size="11" class="t" font-weight="400">open source on AKS</text>
  <text x="500" y="452" font-size="10" class="s">Numbered badges = request order.</text>
  <text x="500" y="466" font-size="10" class="s">Two endings: 3a (strong) or 5 (weak).</text>
</svg>

