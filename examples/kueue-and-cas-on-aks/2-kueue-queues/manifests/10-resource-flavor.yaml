# Resource flavor tells Kueue which nodes can satisfy the quota.
#
# This flavor pins admission to the autoscaling node pool ("scalepool") via the
# AKS-managed `agentpool` label. Because that pool has cluster autoscaler
# enabled (min=1), Kueue's ProvisioningRequest AdmissionCheck can grow it on
# demand — see 20-provisioning.yaml.
#
# Apply once:
#   kubectl apply -f 10-resource-flavor.yaml
---
apiVersion: kueue.x-k8s.io/v1beta1
kind: ResourceFlavor
metadata:
  name: scalepool-flavor
spec:
  nodeLabels:
    agentpool: scalepool
