apiVersion: inference.networking.k8s.io/v1
kind: InferencePool
metadata:
  name: phi-pool
  namespace: llm
spec:
  selector:
    matchLabels:
      kaito.sh/workspace: workspace-phi-4-mini   # the KAITO pods from kaito-workspace.yaml
  targetPorts:
    - number: 5000                               # the vLLM CONTAINER port, not the Service's 80
  endpointPickerRef:
    name: phi-epp-epp                            # the EPP Service (Helm release phi-epp creates Service phi-epp-epp)
    port:
      number: 9002                               # required for a Service referent; the EPP Service port
---
# NOTE: InferenceObjective lives in the inference.networking.x-k8s.io group
# (NOT inference.networking.k8s.io, which is where InferencePool lives).
apiVersion: inference.networking.x-k8s.io/v1alpha2
kind: InferenceObjective
metadata:
  name: phi-weak
  namespace: llm
spec:
  priority: 0                                    # integer priority (lower = higher); not consulted here — only one objective in the pool
  poolRef:
    name: phi-pool
