apiVersion: inference.networking.k8s.io/v1
kind: InferencePool
metadata:
  name: phi-pool
  namespace: llm
spec:
  selector:
    matchLabels:
      kaito.sh/workspace: workspace-phi-4-mini   # the KAITO pods from kaito-workspace.yaml
  targetPorts:
    - number: 5000                               # the vLLM CONTAINER port, not the Service's 80
  endpointPickerRef:
    name: phi-epp                                # the Endpoint Picker installed via Helm
---
# NOTE: InferenceObjective lives in the inference.networking.x-k8s.io group
# (NOT inference.networking.k8s.io, which is where InferencePool lives).
apiVersion: inference.networking.x-k8s.io/v1alpha2
kind: InferenceObjective
metadata:
  name: phi-weak
  namespace: llm
spec:
  priority: 0                                    # integer priority; no modelName/criticality in v1
  poolRef:
    name: phi-pool
