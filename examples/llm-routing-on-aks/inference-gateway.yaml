apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: inference-gw
  namespace: llm
spec:
  # Managed Application routing gateway. Its Gateway API Inference Extension
  # support is private preview (gated) as of mid-2026 — to run the weak path
  # today, install the self-managed upstream-Istio gateway from the README and
  # set this to `istio-gie` instead. No other changes needed.
  gatewayClassName: approuting-istio
  listeners:
    - name: http
      protocol: HTTP
      port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: weak-route
  namespace: llm
spec:
  parentRefs: [{ name: inference-gw }]
  rules:
    - backendRefs:
        - group: inference.networking.k8s.io
          kind: InferencePool          # the backend is the pool, not a Service
          name: phi-pool

