# agentgateway-config.yaml
#
# This is agentgateway's APPLICATION CONFIG — NOT a Kubernetes manifest.
# It has no apiVersion/kind (GVK) by design: it's read by the agentgateway
# process, not `kubectl apply`. Deploy agentgateway as a Deployment + Service
# and mount this file as its config (e.g. via a ConfigMap).
#
# This shape was validated against agentgateway v1.3.1. Pin to that release;
# field names move between versions: https://agentgateway.dev/docs/

# A model-cost catalog turns token counts into real $/request in logs, traces,
# and metrics. It lives under the top-level `config:` object (NOT at the document
# root — the v1.3.1 loader rejects a root-level `modelCatalog`).
config:
  modelCatalog:
    - model: gpt-5.1
      rates: { input: "2.50", output: "10.00" }   # USD per 1,000,000 tokens
    - model: phi-4-mini-instruct
      rates: { input: "0.00", output: "0.00" }     # your amortized GPU cost

binds:
  - port: 4000
    listeners:
      - name: default
        protocol: HTTP
        routes:

          # ---- "strong": frontier model on Azure OpenAI (managed) ----
          # An AI backend is `ai: { name, provider: { <provider>: {...} } }`.
          # The Azure provider REQUIRES resourceName + resourceType; `model` is
          # the Azure *deployment* name. resourceType: openAI builds the host
          # {resourceName}.openai.azure.com (use `foundry` for AI Foundry).
          - name: strong
            matches:
              - path: { pathPrefix: /strong }
            policies:
              # auth attaches as a ROUTE policy; key is a plain string (or {file:}).
              # The azure provider sends it as the `api-key` header automatically.
              # NOTE: agentgateway does NOT expand shell variables — substitute a
              # real value (or use the {file: /path/to/key} form) at deploy time.
              backendAuth:
                key: "<your-azure-openai-api-key>"
              # a token bucket — the backstop against an agent loop that won't
              # stop spending. 60k tokens/minute here; tune to your budget.
              localRateLimit:
                - maxTokens: 60000
                  tokensPerFill: 60000
                  fillInterval: 60s
            backends:
              - ai:
                  name: aoai-strong
                  provider:
                    azure:
                      resourceName: "<your-aoai-resource>"   # the resource name, not a URL
                      resourceType: openAI
                      model: gpt-5.1                   # the Azure deployment name
                      apiVersion: "2024-10-21"

          # ---- "weak": self-hosted, via the Layer-3 inference gateway ----
          # The inference gateway already speaks OpenAI, so a plain host backend
          # with a path rewrite is simpler than wrapping it in an `ai:` provider.
          - name: weak
            matches:
              - path: { pathPrefix: /weak }
            policies:
              urlRewrite:
                path: { full: /v1/chat/completions }
            backends:
              # the Layer-3 gateway (managed App Routing, or the self-managed
              # upstream-Istio gateway — see README)
              - host: inference-gw.llm.svc.cluster.local:80
